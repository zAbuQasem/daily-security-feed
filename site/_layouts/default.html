<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Feed" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <script>(function(){var t=localStorage.getItem('sfm-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..700,0..100,0..1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
     *  EDITORIAL LAYOUT · SECURITY FEED MONITOR
     * ───────────────────────────────────────── */

    :root {
      --paper:        #f6f1e6;
      --paper-deep:   #efe8d5;
      --ink:          #181410;
      --ink-muted:    #6b6355;
      --ink-faint:    #a89f8b;
      --rule:         #d6cdb6;
      --rule-strong:  #181410;
      --accent:       #9a2a1f;
      --accent-soft:  #f0dcd3;
      --shadow:       rgba(24,20,16,0.08);

      --serif: 'Fraunces', 'Times New Roman', Georgia, serif;
      --mono:  'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }

    [data-theme="dark"] {
      --paper:        #14110c;
      --paper-deep:   #1e1a13;
      --ink:          #f6f1e6;
      --ink-muted:    #a89f8b;
      --ink-faint:    #5a5347;
      --rule:         #2e2a22;
      --rule-strong:  #f6f1e6;
      --accent:       #e89080;
      --accent-soft:  rgba(232,144,128,0.08);
      --shadow:       rgba(0,0,0,0.35);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 12;
      font-size: 16px;
      line-height: 1.65;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.09 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.8 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    [data-theme="dark"] body::before { mix-blend-mode: screen; opacity: 0.15; }

    a {
      color: inherit;
      text-decoration: none;
      transition: color 200ms ease;
    }

    ::selection { background: var(--accent); color: var(--paper); }

    .page {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ─────────────────────────────
     *  MASTHEAD
     * ───────────────────────────── */

    .masthead {
      padding: 3.5rem 0 1rem;
      text-align: center;
      animation: fadeSlide 0.8s ease-out both;
    }

    .masthead__top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--rule-strong);
      font-family: var(--serif);
      font-variation-settings: 'opsz' 9;
      font-style: italic;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .masthead__title {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144, 'wght' 700, 'SOFT' 20, 'WONK' 1;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      line-height: 0.92;
      letter-spacing: -0.035em;
      color: var(--ink);
      margin: 1.25rem 0 0.5rem;
      text-transform: uppercase;
      font-feature-settings: 'ss01' 1, 'ss02' 1;
    }

    .masthead__title a { color: inherit; }

    .masthead__subtitle {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 12;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--ink-muted);
      margin-bottom: 1rem;
    }

    .masthead__rule {
      position: relative;
      height: 7px;
      border-top: 2px solid var(--rule-strong);
      border-bottom: 1px solid var(--rule-strong);
      margin-top: 0.5rem;
    }

    /* ─────────────────────────────
     *  NAVIGATION
     * ───────────────────────────── */

    .nav {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.7rem;
      padding: 1.2rem 0 1.25rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--rule);
      font-family: var(--serif);
      font-variation-settings: 'opsz' 9;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav__link {
      color: var(--ink);
      padding: 0.15rem 0;
      border: none;
      background: none;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      position: relative;
    }

    .nav__link::after {
      content: '';
      position: absolute;
      left: 50%;
      right: 50%;
      bottom: -3px;
      height: 1px;
      background: var(--accent);
      transition: left 220ms ease, right 220ms ease;
    }

    .nav__link:hover { color: var(--accent); }
    .nav__link:hover::after { left: 0; right: 0; }

    .nav__link--active {
      font-style: italic;
      font-variation-settings: 'opsz' 9, 'wght' 600;
    }

    .nav__sep {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ─────────────────────────────
     *  MAIN CONTENT
     * ───────────────────────────── */

    main.content {
      animation: fadeSlide 0.8s 0.1s ease-out both;
    }

    /* ─────────────────────────────
     *  EDITOR'S NOTE / INTRO
     * ───────────────────────────── */

    .intro {
      margin-bottom: 2.25rem;
      padding: 0 0.25rem;
    }

    .intro__text {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 14;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.65;
      color: var(--ink-muted);
      text-align: center;
    }

    .intro__count {
      font-style: normal;
      font-variation-settings: 'opsz' 14, 'wght' 700, 'SOFT' 20, 'WONK' 1;
      color: var(--ink);
      font-size: 1.05rem;
    }

    /* ─────────────────────────────
     *  SEARCH
     * ───────────────────────────── */

    .search-bar {
      position: relative;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
    }

    .search-bar__icon {
      position: absolute;
      left: 0.1rem;
      top: 0.55rem;
      color: var(--ink-muted);
      font-size: 0.95rem;
      pointer-events: none;
      font-style: italic;
    }

    .search-bar__input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--rule-strong);
      padding: 0.55rem 2rem 0.55rem 1.5rem;
      font-family: var(--serif);
      font-variation-settings: 'opsz' 14;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--ink);
      outline: none;
      transition: border-color 200ms ease;
    }

    .search-bar__input::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    .search-bar__input:focus { border-bottom-color: var(--accent); }

    .search-bar__clear {
      position: absolute;
      right: 0.1rem;
      top: 0.45rem;
      background: none;
      border: none;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.3rem;
      display: none;
      font-family: var(--serif);
    }

    .search-bar__clear:hover { color: var(--accent); }

    /* ─────────────────────────────
     *  TAG FILTERS STRIP
     * ───────────────────────────── */

    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.8rem 0.9rem;
      margin-bottom: 3.25rem;
      padding-bottom: 2rem;
      border-bottom: 3px double var(--rule);
    }

    .tag-filters__label {
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.72rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 0.1rem;
    }

    /* ─────────────────────────────
     *  TAG (shared)
     * ───────────────────────────── */

    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-muted);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: color 150ms ease;
      text-transform: lowercase;
      letter-spacing: 0;
    }

    .tag::before { content: '#'; opacity: 0.35; margin-right: 0.05em; }
    .tag:hover { color: var(--accent); }

    .tag.is-active {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    /* ─────────────────────────────
     *  STATS BAR
     * ───────────────────────────── */

    .stats-bar {
      display: none; /* Merged into intro */
    }

    /* ─────────────────────────────
     *  DATE SECTIONS
     * ───────────────────────────── */

    .date-card {
      margin-bottom: 3.5rem;
      counter-reset: article-counter;
    }

    .date-card__header {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      padding-bottom: 0.55rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--rule-strong);
      cursor: default;
      user-select: none;
    }

    .date-card__date {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 48, 'wght' 650, 'SOFT' 20, 'WONK' 1;
      font-size: 1.55rem;
      line-height: 1;
      letter-spacing: -0.015em;
      color: var(--ink);
      text-transform: lowercase;
    }

    .date-card__count {
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.72rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-left: auto;
      background: none;
      border: none;
      padding: 0;
    }

    .date-card__tags,
    .date-card__chevron,
    .date-card__info { display: none; }

    .date-card__body {
      max-height: none !important;
      overflow: visible !important;
    }

    .date-card__content { padding: 0; }

    /* ─────────────────────────────
     *  ARTICLE ROW — numbered editorial entries
     * ───────────────────────────── */

    .article-row {
      display: flex;
      gap: 1.5rem;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--rule);
      position: relative;
      counter-increment: article-counter;
      transition: padding-left 250ms cubic-bezier(0.22,1,0.36,1);
    }

    .article-row:last-child { border-bottom: none; }

    .article-row::before {
      content: counter(article-counter, decimal-leading-zero);
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9, 'wght' 500;
      font-size: 0.8rem;
      color: var(--ink-faint);
      flex: 0 0 2.2rem;
      padding-top: 0.28rem;
      letter-spacing: 0.05em;
    }

    .article-row:hover { padding-left: 0.5rem; }
    .article-row:hover::before { color: var(--accent); }

    .article-row__priority { display: none; }

    .article-row__body { flex: 1; min-width: 0; }

    .article-row__title {
      display: block;
      font-family: var(--serif);
      font-variation-settings: 'opsz' 24, 'wght' 550, 'SOFT' 20;
      font-size: 1.18rem;
      line-height: 1.32;
      color: var(--ink);
      letter-spacing: -0.012em;
      transition: color 180ms ease;
      text-wrap: balance;
    }

    .article-row__title:hover { color: var(--accent); }

    .article-row__meta {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.35rem 0.6rem;
      margin-top: 0.45rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--ink-muted);
    }

    .article-row__feed {
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-left: auto;
    }

    /* ─────────────────────────────
     *  NO RESULTS / EMPTY STATE
     * ───────────────────────────── */

    .no-results,
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 12;
      color: var(--ink-muted);
      font-size: 1.05rem;
    }

    .no-results { display: none; }

    /* ─────────────────────────────
     *  POST ARTICLE PAGE
     * ───────────────────────────── */

    .post-article {
      max-width: 640px;
      margin: 0 auto;
      animation: fadeSlide 0.7s ease-out both;
    }

    .post-article__back {
      display: inline-block;
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
      position: relative;
    }

    .post-article__back::before {
      content: '←';
      margin-right: 0.35rem;
      transition: transform 220ms ease;
      display: inline-block;
    }

    .post-article__back:hover { color: var(--accent); }
    .post-article__back:hover::before { transform: translateX(-3px); }

    .post-article__title {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144, 'wght' 700, 'SOFT' 20, 'WONK' 1;
      font-size: clamp(2rem, 4.5vw, 2.8rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 1.25rem;
      text-wrap: balance;
    }

    .post-article__meta {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 2rem;
      margin-bottom: 2rem;
      border-bottom: 3px double var(--rule);
    }

    .post-article__date {
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.85rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .post-article__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .post-article__body {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 14;
      font-size: 1.12rem;
      line-height: 1.78;
      color: var(--ink);
    }

    .post-article__body p { margin-bottom: 1.35rem; }

    /* Drop cap on first paragraph */
    .post-article__body > p:first-of-type::first-letter {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 144, 'wght' 800, 'SOFT' 15, 'WONK' 1;
      font-size: 4.8rem;
      float: left;
      line-height: 0.85;
      padding: 0.32rem 0.55rem 0 0;
      margin: 0.1rem 0 -0.15rem 0;
      color: var(--accent);
    }

    .post-article__body a {
      color: var(--ink);
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 100% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 200ms ease, color 200ms ease;
      padding-bottom: 2px;
    }

    .post-article__body a:hover {
      color: var(--accent);
      background-size: 100% 100%;
    }

    .post-article__body code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--paper-deep);
      border: 1px solid var(--rule);
      padding: 0.1em 0.4em;
      border-radius: 2px;
    }

    .post-article__body pre {
      background: var(--paper-deep);
      border: 1px solid var(--rule);
      padding: 1.2rem;
      overflow-x: auto;
      margin-bottom: 1.35rem;
    }

    .post-article__body pre code { background: none; border: none; padding: 0; }

    .post-article__body blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--ink-muted);
    }

    .post-article__body h1,
    .post-article__body h2,
    .post-article__body h3 {
      font-family: var(--serif);
      font-variation-settings: 'opsz' 48, 'wght' 650, 'SOFT' 20;
      line-height: 1.2;
      margin: 2rem 0 0.8rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .post-article__body h1 { font-size: 1.55rem; }
    .post-article__body h2 { font-size: 1.3rem; }
    .post-article__body h3 { font-size: 1.1rem; }

    .post-article__body ul, .post-article__body ol {
      padding-left: 1.5rem;
      margin-bottom: 1.35rem;
    }

    .post-article__body li { margin-bottom: 0.4rem; }
    .post-article__body hr {
      border: none;
      text-align: center;
      margin: 2.5rem 0;
    }
    .post-article__body hr::before {
      content: '· · ·';
      color: var(--ink-faint);
      letter-spacing: 0.5em;
      font-size: 1.2rem;
    }

    .post-article__source {
      display: inline-block;
      margin-top: 2rem;
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 12;
      font-size: 0.95rem;
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .post-article__source:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ─────────────────────────────
     *  FOOTER
     * ───────────────────────────── */

    .site-footer {
      margin: 5rem auto 3rem;
      padding: 2rem 0 0;
      border-top: 3px double var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 1rem;
      font-family: var(--serif);
      font-style: italic;
      font-variation-settings: 'opsz' 9;
      font-size: 0.78rem;
      color: var(--ink-muted);
      text-align: center;
    }

    .site-footer__left,
    .site-footer__right {
      flex: 1;
      min-width: 200px;
    }

    .site-footer__left { text-align: left; }
    .site-footer__right { text-align: right; }

    @media (max-width: 520px) {
      .site-footer__left, .site-footer__right { text-align: center; flex: 100%; }
    }

    .site-footer a {
      color: var(--ink);
      border-bottom: 1px solid var(--rule-strong);
      padding-bottom: 1px;
    }

    .site-footer a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ─────────────────────────────
     *  ANIMATIONS
     * ───────────────────────────── */

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .date-card { animation: fadeSlide 0.7s ease-out both; }
    .date-card:nth-child(1) { animation-delay: 0.12s; }
    .date-card:nth-child(2) { animation-delay: 0.18s; }
    .date-card:nth-child(3) { animation-delay: 0.24s; }
    .date-card:nth-child(4) { animation-delay: 0.30s; }
    .date-card:nth-child(5) { animation-delay: 0.36s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─────────────────────────────
     *  RESPONSIVE
     * ───────────────────────────── */

    @media (max-width: 640px) {
      .page { padding: 0 1.25rem; }
      .masthead { padding: 2.5rem 0 0.75rem; }
      .masthead__top { font-size: 0.6rem; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
      .nav { gap: 0.4rem; font-size: 0.7rem; }
      .article-row { gap: 1rem; padding: 1.15rem 0; }
      .article-row::before { flex: 0 0 1.6rem; font-size: 0.7rem; }
      .article-row__title { font-size: 1.05rem; }
      .date-card__date { font-size: 1.25rem; }
      .post-article__body > p:first-of-type::first-letter {
        font-size: 3.8rem; padding: 0.2rem 0.4rem 0 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- ─── MASTHEAD ─── -->
    <header class="masthead">
      <div class="masthead__top">
        <span>{{ site.time | date: "%A · %b %e, %Y" }}</span>
        <span>Vol. I &middot; № {{ site.posts | size }}</span>
      </div>
      <h1 class="masthead__title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="masthead__subtitle">{{ site.description }}</p>
      <div class="masthead__rule"></div>
    </header>

    <!-- ─── NAVIGATION ─── -->
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="nav__link {% if page.url == '/' or page.url == '/index.html' %}nav__link--active{% endif %}">Home</a>
      <span class="nav__sep">§</span>

  <script>
  (function(){
    function setTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('sfm-theme', t);
      var lbl = document.getElementById('themeLabel');
      if (lbl) lbl.textContent = t === 'dark' ? 'Light' : 'Dark';
    }
    var toggle = document.getElementById('themeToggle');
    if (toggle) {
      toggle.addEventListener('click', function(){
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    }
    // Sync label on load
    var lbl = document.getElementById('themeLabel');
    if (lbl) lbl.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
  })();
  </script>
