<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <style>
    :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #22c55e; --muted: #484f58; --card: #161b22; --border: #30363d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
    header h1 { color: var(--accent); font-size: 1.6rem; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; text-transform: uppercase; }
    .badge-1 { background: #3a1a1a; color: #f87171; border: 1px solid #ef4444; }
    .badge-2 { background: #2a2a1a; color: #fbbf24; border: 1px solid #eab308; }
    .badge-3 { background: #1a2a3a; color: #7dd3fc; border: 1px solid #38bdf8; }
    .tag { display: inline-block; font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; background: var(--card); border: 1px solid var(--border); color: var(--muted); margin: 2px 2px 2px 0; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </header>
    <main>{{ content }}</main>
    <footer>
      Auto-updated daily by <a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}">{{ site.github.repository_name }}</a>
      · <a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}#quick-start">Fork &amp; customize</a>
    </footer>
  </div>
</body>
</html>
