<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Feed" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <!-- Prevent flash of wrong theme -->
  <script>(function(){var t=localStorage.getItem('sfm-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --sidebar-w: 260px;
      --bg:            #f8fafc;
      --surface:       #ffffff;
      --border:        #e2e8f0;
      --text:          #1e293b;
      --text-muted:    #64748b;
      --text-faint:    #94a3b8;
      --accent:        #3b82f6;
      --accent-hover:  #2563eb;
      --accent-subtle: #eff6ff;
      --accent-border: #bfdbfe;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --r:  6px;
      --rs: 4px;
      --t:  150ms ease;
    }
    [data-theme="dark"] {
      --bg:            #0f172a;
      --surface:       #1e293b;
      --border:        #334155;
      --text:          #f1f5f9;
      --text-muted:    #94a3b8;
      --text-faint:    #475569;
      --accent:        #60a5fa;
      --accent-hover:  #93c5fd;
      --accent-subtle: rgba(96,165,250,0.08);
      --accent-border: rgba(96,165,250,0.3);
    }

    /* ── Reset ── */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; transition: color var(--t); }
    a:hover { color: var(--accent-hover); }
    ::selection { background: var(--accent-subtle); color: var(--text); }

    /* ── Layout ── */
    .site { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
    }

    .site-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .content {
      flex: 1;
      max-width: 800px;
      padding: 2.5rem 3rem 4rem;
    }

    /* ── Sidebar: Brand ── */
    .brand { margin-bottom: 1.75rem; }
    .brand__title {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      color: var(--text);
    }
    .brand__title a { color: inherit; }
    .brand__title a:hover { color: var(--accent); }
    .brand__tagline { font-size: 0.73rem; color: var(--text-muted); margin-top: 0.35rem; line-height: 1.5; }
    .brand__count {
      display: inline-block;
      margin-top: 0.65rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: var(--rs);
    }

    /* ── Sidebar: Divider ── */
    .sidebar-divider { height: 1px; background: var(--border); margin: 1.1rem 0; }

    /* ── Sidebar: Nav ── */
    .sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.65rem;
      border-radius: var(--r);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: background var(--t), color var(--t);
    }
    .sidebar-nav a:hover { color: var(--text); background: var(--accent-subtle); }
    .sidebar-nav a.is-active { color: var(--accent); background: var(--accent-subtle); }
    .sidebar-nav svg { width: 15px; height: 15px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── Sidebar: Theme toggle ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.65rem;
      border-radius: var(--r);
      border: none;
      background: none;
      cursor: pointer;
      width: 100%;
      font: 500 0.84rem/1 var(--font);
      color: var(--text-muted);
      text-align: left;
      transition: background var(--t), color var(--t);
    }
    .theme-toggle:hover { color: var(--text); background: var(--accent-subtle); }
    .theme-toggle svg { width: 15px; height: 15px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }
    .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun  { display: none; }
    [data-theme="dark"] .icon-moon { display: block; }

    /* ── Sidebar: Social ── */
    .sidebar-social { display: flex; gap: 0.4rem; margin-top: auto; padding-top: 1.25rem; }
    .sidebar-social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: var(--rs);
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      transition: all var(--t);
    }
    .sidebar-social a:hover { color: var(--accent); border-color: var(--accent-border); background: var(--accent-subtle); }
    .sidebar-social svg { width: 14px; height: 14px; fill: currentColor; }
    .sidebar-social .icon-stroke { fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; font: 0.72rem/1 var(--mono); color: var(--text-faint); }
    .stats-bar__value { color: var(--text-muted); font-weight: 500; }

    /* ── Search ── */
    .search-bar { position: relative; margin-bottom: 1.25rem; }
    .search-bar__icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
      font-size: 0.9rem;
    }
    .search-bar__input {
      width: 100%;
      padding: 0.6rem 2.25rem 0.6rem 2.2rem;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      color: var(--text);
      font: 0.875rem/1 var(--font);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .search-bar__input::placeholder { color: var(--text-faint); }
    .search-bar__input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
    .search-bar__clear {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem;
      display: none;
    }
    .search-bar__clear:hover { color: var(--text); }

    /* ── Tag filters ── */
    .tag-filters { display: flex; flex-wrap: wrap; align-items: center; gap: 0.3rem; margin-bottom: 2rem; }
    .tag-filters__label {
      font: 600 0.64rem/1 var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-right: 0.2rem;
    }

    /* ── Tags (shared) ── */
    .tag {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font: 0.67rem/1.5 var(--mono);
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--t);
    }
    .tag:hover, .tag.is-active { color: var(--accent); border-color: var(--accent-border); background: var(--accent-subtle); }
    .tag.is-active { font-weight: 500; }

    /* ── Date cards ── */
    .date-card { margin-bottom: 2.25rem; }
    .date-card__header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.15rem;
      cursor: pointer;
      user-select: none;
    }
    .date-card__date {
      font: 600 0.75rem/1 var(--font);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .date-card__count {
      font: 0.64rem/1 var(--mono);
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: var(--rs);
    }
    .date-card__tags { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .date-card__info { display: flex; align-items: center; gap: 0.45rem; margin-left: auto; }
    .date-card__chevron { color: var(--text-faint); font-size: 0.7rem; transition: transform 200ms ease; }
    .date-card.is-open .date-card__chevron { transform: rotate(90deg); }
    .date-card__body { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
    .date-card.is-open .date-card__body { max-height: 5000px; }
    .date-card__content { padding: 0.15rem 0; }

    /* ── Article rows ── */
    .article-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding: 0.85rem 0.65rem;
      margin: 0 -0.65rem;
      border-bottom: 1px solid var(--border);
      border-radius: var(--r);
      transition: background var(--t);
    }
    .article-row:last-child { border-bottom: none; }
    .article-row:hover { background: var(--accent-subtle); }
    .article-row__priority { display: none; }
    .article-row__body { flex: 1; min-width: 0; }
    .article-row__title {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      transition: color var(--t);
    }
    .article-row__title:hover { color: var(--accent); }
    .article-row__meta { display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.35rem; }
    .article-row__feed { font: 0.63rem/1 var(--mono); color: var(--text-faint); }

    /* ── No results / empty ── */
    .no-results { text-align: center; padding: 3rem 2rem; color: var(--text-faint); font-size: 0.875rem; display: none; }
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--text-faint); font-size: 0.9rem; }

    /* ── Post article page ── */
    .post-article { max-width: 680px; }
    .post-article__back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .post-article__back:hover { color: var(--accent); }
    .post-article__title {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .post-article__meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .post-article__date { font: 0.78rem/1 var(--mono); color: var(--text-faint); }
    .post-article__tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .post-article__body { font-size: 0.95rem; line-height: 1.8; color: var(--text); }
    .post-article__body p { margin-bottom: 1.2rem; }
    .post-article__body a { text-decoration: underline; text-underline-offset: 2px; }
    .post-article__body code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.1em 0.4em;
      border-radius: var(--rs);
    }
    .post-article__body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.2rem;
    }
    .post-article__body pre code { background: none; border: none; padding: 0; font-size: 0.85rem; }
    .post-article__body blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1rem;
      color: var(--text-muted);
      margin: 1.2rem 0;
      font-style: italic;
    }
    .post-article__body h1,.post-article__body h2,.post-article__body h3 {
      font-weight: 600;
      line-height: 1.35;
      margin: 1.75rem 0 0.75rem;
      color: var(--text);
    }
    .post-article__body h1 { font-size: 1.35rem; }
    .post-article__body h2 { font-size: 1.15rem; }
    .post-article__body h3 { font-size: 1rem; }
    .post-article__body ul,.post-article__body ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }
    .post-article__body li { margin-bottom: 0.3rem; }
    .post-article__body hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .post-article__source {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2rem;
      padding: 0.6rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--r);
      font-size: 0.85rem;
      font-weight: 500;
      transition: background var(--t);
    }
    .post-article__source:hover { background: var(--accent-hover); color: #fff; }
    /* Style the "Read original article" markdown link */
    .post-article__body a[href*="//"] {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.73rem;
      color: var(--text-faint);
    }
    .site-footer a { color: var(--text-faint); }
    .site-footer a:hover { color: var(--accent); }

    /* ── Mobile header ── */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 99;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: none;
      align-items: center;
      justify-content: space-between;
    }
    .mobile-header__title { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .mobile-header__title a { color: inherit; }
    .mobile-header__btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      font: 0.8rem/1 var(--font);
      transition: all var(--t);
    }
    .mobile-header__btn:hover { color: var(--text); background: var(--accent-subtle); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-header { display: flex; }
      .content { padding: 1.5rem 1.25rem 3rem; }
      .site-footer { padding: 1rem 1.25rem; flex-direction: column; gap: 0.4rem; text-align: center; }
      .date-card__tags { display: none; }
    }
  </style>
</head>
<body>
  <!-- Mobile header (desktop: hidden) -->
  <div class="mobile-header">
    <span class="mobile-header__title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></span>
    <button class="mobile-header__btn" id="mobileTheme">◑ Theme</button>
  </div>

  <div class="site">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
        <p class="brand__tagline">{{ site.description }}</p>
        <span class="brand__count">{{ site.posts | size }} articles indexed</span>
      </div>

      <div class="sidebar-divider"></div>

      <ul class="sidebar-nav">
        <li>
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="is-active"{% endif %}>
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </a>
        </li>
      </ul>

      <div class="sidebar-divider"></div>

      <button class="theme-toggle" id="themeToggle">
        <svg class="icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <span id="themeLabel">Light mode</span>
      </button>

      <div class="sidebar-social">
        <a href="https://github.com/zAbuQasem" target="_blank" rel="noopener" title="GitHub">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.337-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>
        <a href="https://www.linkedin.com/in/zeyad-abulaban/" target="_blank" rel="noopener" title="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="https://github.com/zAbuQasem/security-feed-monitor" target="_blank" rel="noopener" title="Source">
          <svg class="icon-stroke" viewBox="0 0 24 24" style="fill:none"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        </a>
      </div>
    </aside>

    <!-- Main content -->
    <div class="site-main">
      <main class="content">
        {{ content }}
      </main>
      <footer class="site-footer">
        <span>Built by <a href="https://github.com/zAbuQasem">zAbuQasem</a></span>
        <span>
          <a href="https://github.com/zAbuQasem/security-feed-monitor">Source</a>
          &middot;
          <a href="https://github.com/zAbuQasem/security-feed-monitor#quick-start">Fork</a>
        </span>
      </footer>
    </div>
  </div>

  <script>
  (function(){
    function setTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('sfm-theme', t);
      var lbl = document.getElementById('themeLabel');
      if (lbl) lbl.textContent = t === 'dark' ? 'Dark mode' : 'Light mode';
    }
    function handleToggle(){
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    var toggle = document.getElementById('themeToggle');
    var mobileToggle = document.getElementById('mobileTheme');
    if (toggle) toggle.addEventListener('click', handleToggle);
    if (mobileToggle) mobileToggle.addEventListener('click', handleToggle);
    // Sync label on load
    var lbl = document.getElementById('themeLabel');
    if (lbl) lbl.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Dark mode' : 'Light mode';
  })();
  </script>
</body>
</html>
